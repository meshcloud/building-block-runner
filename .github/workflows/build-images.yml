name: Build Release Images

env:
  REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

on:
  workflow_call:
    inputs:
      version:
        description: "Release version to tag images with, e.g. v1.2.3"
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # cmd/bbrunner is the controller/superset (D2) — the run-controller image ships
          # it directly; cmd/tf is the lean fit persona binary (PLAN_DETAIL_04 §4.4/§4.5).
          - app: run-controller
            dockerfile: containers/run-controller/Dockerfile
          - app: tf-block-runner
            dockerfile: containers/tf-block-runner/Dockerfile
          - app: manual-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: manual-block-runner
          - app: github-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: github-block-runner
          - app: gitlab-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: gitlab-block-runner
          - app: azure-devops-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: azure-devops-block-runner

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.repository_owner == 'meshcloud'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push ${{ matrix.app }}
        if: github.repository_owner == 'meshcloud'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:latest
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            RUNNER_MODULE=${{ matrix.runner-module }}
