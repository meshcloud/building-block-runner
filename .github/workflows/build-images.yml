name: Build Release Images

env:
  REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

on:
  workflow_call:
    inputs:
      version:
        description: "Release version to tag images with, e.g. v1.2.3"
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  # Release build: one job builds and pushes all six shipped images through the single
  # multi-target docker-bake.hcl via the SAME `task images` bake CI and local dev use (go-task +
  # the standalone docker-buildx binary come from the flake dev shell). Each image gets the
  # immutable :<version> tag plus :latest, on both GHCR and Docker Hub, multi-arch
  # linux/amd64+linux/arm64.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v14

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.repository_owner == 'meshcloud'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release images
        if: github.repository_owner == 'meshcloud'
        run: nix develop --command task images -- --push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REGISTRIES: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }},${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
          TAGS: ${{ steps.version.outputs.version }},latest
          # Multi-arch published images (bake defaults to host-native for local use; the
          # setup-buildx-action container builder builds both arches for the push).
          PLATFORMS: linux/amd64,linux/arm64
