name: CI

env:
  REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Go-only CI (D14 — the JVM/Gradle legs die here with the last Kotlin module removed in
  # this same phase): golangci-lint runs as its own job so it can gate independently of
  # `test` (both are prerequisites of `images`, run in parallel, no `needs:` between them).
  lint:
    name: Go - lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      # Pinned to the exact golangci-lint release the flake/dev-shell ships (nixos-25.11's
      # golangci-lint, v2.12.2 — PLAN_DETAIL_00 §4) rather than the action's own
      # `version: latest` + `only-new-issues: true` default: after phases 0-6 the tree is
      # already clean under this config (`.golangci.yml`), so a full-run/fail-on-any gate
      # is achievable now and `only-new-issues` would mask a regression on the next PR.
      # Local (`task lint`) and CI intentionally track the same major/minor; a version bump
      # here travels with a flake bump, not independently.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  # Phase 4 (PLAN_DETAIL_04 §4.5): the three per-module legs (go-meshapi-client,
  # run-controller, tf-block-runner) collapse into one repo-root leg — module
  # consolidation (PLAN_DETAIL_04 §4.6) means `go test ./...` at root already covers every
  # `cmd/*` + `internal/*` package, so a matrix no longer discriminates anything real.
  # -race stays on for the whole suite (it covered only the tf leg before; A6 required it
  # stay race-clean, and Taskfile's `task test` already runs the full suite with -race).
  test:
    name: Go - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse commit
        id: commit
        run: |
          echo "commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage
        run: tools/coverage/check.sh . coverage.out

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out

  # One job builds every shipped image through the single multi-target docker-bake.hcl via the
  # SAME `task images` bake local dev uses (go-task + the standalone docker-buildx binary come from
  # the flake dev shell). PRs build all six images but never push (validates the build); main pushes
  # the floating :main tag plus the immutable :<sha> tag to GHCR and Docker Hub. The git-describe
  # version is baked into every binary via the VERSION build-arg. The six targets: run-controller
  # (-tags k8s), tf (-tags type_tf, alpine runtime), and the four HTTP fit images (type_<x>, scratch
  # runtime) — all from cmd/bbrunner, differing only by CMD_TAGS + baked config.
  images:
    name: images
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0      # full history + tags so `git describe` can derive the version

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          # git describe -> e.g. v1.0.0 on a release commit, v1.0.0-10-g6ccdaf8 on commits after it.
          VERSION="$(git describe --tags --always)"
          echo "resolved version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v14

      - name: Login to GHCR
        if: github.repository_owner == 'meshcloud' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.repository_owner == 'meshcloud' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PRs: build all six images to validate the bake; never push.
      - name: Build images (PR)
        if: github.ref != 'refs/heads/main'
        run: nix develop --command task images
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAGS: pr-${{ github.event.pull_request.number }}

      # main: build and push the floating :main + immutable :<sha> tags to both registries.
      - name: Build and push images (main)
        if: github.repository_owner == 'meshcloud' && github.ref == 'refs/heads/main'
        run: nix develop --command task images -- --push
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          REGISTRIES: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }},${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
          TAGS: main,${{ github.sha }}
          # Multi-arch published images. The bake defaults to host-native (so a local `task images`
          # works on the plain docker driver); setup-buildx-action provides the docker-container
          # builder that builds both arches for the push.
          PLATFORMS: linux/amd64,linux/arm64
