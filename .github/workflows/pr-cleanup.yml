name: PR Cleanup

env:
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-ghcr:
    name: ${{ matrix.image }} - cleanup GHCR
    if: github.repository_owner == 'meshcloud' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - manual-block-runner
          - github-block-runner
          - gitlab-block-runner
          - azure-devops-block-runner
          - run-controller
          - tf-block-runner
    steps:
      - name: Delete PR image from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE: ${{ matrix.image }}
          NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
        run: |
          pr_tag="pr-${PR_NUMBER}"

          version_id=$(gh api --paginate "/orgs/${NAMESPACE}/packages/container/${IMAGE}/versions?per_page=100" \
            --jq ".[] | select(.metadata.container.tags[]? == \"$pr_tag\") | .id")

          if [ -n "$version_id" ]; then
            gh api --method DELETE "/orgs/${NAMESPACE}/packages/container/${IMAGE}/versions/${version_id}"
            echo "Deleted GHCR tag: $pr_tag (version $version_id)"
          else
            echo "Tag not found (skipping): $pr_tag"
          fi

  cleanup-dockerhub:
    name: ${{ matrix.image }} - cleanup Docker Hub
    if: github.repository_owner == 'meshcloud' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - manual-block-runner
          - github-block-runner
          - gitlab-block-runner
          - azure-devops-block-runner
          - run-controller
          - tf-block-runner
    steps:
      - name: Delete PR image from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE: ${{ matrix.image }}
          NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
        run: |
          set -euo pipefail

          token=$(curl -sSf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DOCKERHUB_USERNAME\",\"password\":\"$DOCKERHUB_TOKEN\"}" \
            | jq -r .token)

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to obtain Docker Hub token" >&2
            exit 1
          fi

          pr_tag="pr-${PR_NUMBER}"
          status=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer $token" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/${pr_tag}/")

          if [ "$status" = "204" ]; then
            echo "Deleted Docker Hub tag: $pr_tag"
          elif [ "$status" = "404" ]; then
            echo "Tag not found (skipping): $pr_tag"
          else
            echo "Unexpected status $status for tag: $pr_tag" >&2
            exit 1
          fi
