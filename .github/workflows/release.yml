name: Release

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: run-controller
            dockerfile: run-controller/Dockerfile
          - app: tf-block-runner
            dockerfile: tf-block-runner/Dockerfile
          - app: manual-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: manual-block-runner
          - app: github-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: github-block-runner
          - app: gitlab-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: gitlab-block-runner
          - app: azure-devops-block-runner
            dockerfile: containers/jvm.Dockerfile
            runner-module: azure-devops-block-runner

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        if: github.repository_owner == 'meshcloud'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            RUNNER_MODULE=${{ matrix.runner-module }}
