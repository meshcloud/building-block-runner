logging:
  pattern.console: "%yellow(%d{dd-MM-yyyy HH:mm:ss.SSS}) %magenta([%15.15t]) %highlight(%-5level) ${PID:- } %boldCyan(%21(%X{requestId})) %-40.40logger{39} : %msg%n${LOG_EXCEPTION_CONVERSION_WORD:%ex{15}}"
  level:
    ROOT: INFO
    io.meshcloud: INFO

server:
  port: ${PORT:8101}

spring:
  main:
    web-application-type: servlet
  config:
    import:
      - optional:classpath:runner-config.yml
      - optional:file:./runner-config.yml
