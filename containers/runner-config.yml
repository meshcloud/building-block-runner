# Shared top-level base runner-config.yml (D7, umbrella §5.4/§10.5, plan 06B §6.3):
# deep-merged UNDER each per-impl containers/<persona>/runner-config.yml (base < per-impl
# < env, PLAN_HIGH_LEVEL.md D7). Holds cross-persona defaults common to the gitlab/
# azure-devops/github Kotlin ports -- today just the well-known LOCAL-DEV private key (the
# local-dev pair of meshfed's magic-runner public key). The Kotlin classpath yaml the three
# modules bake in ships the identical key material as a single unbroken base64 line (e.g.
# gitlab-block-runner/src/main/resources/runner-config.yml:12); Go's stdlib encoding/pem
# requires the standard multi-line wrapping, so this file re-wraps the SAME DER bytes into
# valid PEM (decoded key material is byte-identical -- verified in
# internal/config/basekey_test.go) rather than reproducing the single-line string verbatim.
#
# manual (06A) needs no private key and does not read this file -- gitlab (06B) is the
# first port to wire a non-empty base layer. Per config.ResolvePrivateKey's Kotlin-parity
# resolution order (env RUNNER_PRIVATE_KEY_FILE > yaml privateKeyFile > the default mount
# path > this inline value), this key is used ONLY when no operator override resolves --
# never a silent fallback over an operator-set key. Removing it from published-image
# defaults is an explicit phase-7 ledger item (umbrella §10.5).
