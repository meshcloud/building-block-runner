/**
 The jvm-platform is the single source of truth for all dependencies we ship to production.

 Individual gradle builds should not reference additional dependencies directly with a version number,
 but rather define a "version-less" dependency that will be resolved with help of this platform.
 This ensures we use consistent versions across all our libraries and can enforce updates in a single place.

 Note: It's curently not possible to enforce dependency exclusions via platform constraints
 https://github.com/gradle/gradle/issues/12214
 There are a couple alternatives we could use outlined in https://tomgregory.com/how-to-exclude-gradle-dependencies/
*/

plugins {
  id('java-platform')
}

group = 'io.meshcloud.meshstack.platform'

// allow the definition of dependencies to other platforms like the Spring Boot BOM
javaPlatform.allowDependencies()

dependencies {
  // Spring Boot BOM controls versions for all of spring's dependencies
  api(platform('org.springframework.boot:spring-boot-dependencies:3.5.13'))

  // Explicitly control kotlin versions. This should not be necessary since the kotlin plugins do this already
  // for kotlin's stdlib but we do have issues with "kotlin-reflect" library versions if we don't use the BOM.
  // Not applying this BOM will result in "Runtime JAR files in the classpath should have the same version" errors.
  // NOTE: sync this with the gradle plugins version when updating!
  api(enforcedPlatform('org.jetbrains.kotlin:kotlin-bom:2.1.21'))

  // explicitly control jackson versions used throughout our stack as silent serialization
  // behavior changes are dangerous to APIs
  api(enforcedPlatform('com.fasterxml.jackson:jackson-bom:2.18.4.1'))

  constraints {
    api('io.github.microutils:kotlin-logging:3.0.5')

    api('com.squareup.okhttp3:okhttp:4.12.0')
    api('com.squareup.okhttp3:logging-interceptor:4.12.0')

    api('org.hashids:hashids:1.0.3')
    api('org.bouncycastle:bcprov-jdk15on:1.70')
    api('com.auth0:java-jwt:4.5.0')
  }
}
