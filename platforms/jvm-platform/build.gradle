/**
 The jvm-platform is the single source of truth for all dependencies we ship to production.

 Individual gradle builds should not reference additional dependencies directly with a version number,
 but rather define a "version-less" dependency that will be resolved with help of this platform.
 This ensures we use consistent versions across all our libraries and can enforce updates in a single place.

 Note: It's curently not possible to enforce dependency exclusions via platform constraints
 https://github.com/gradle/gradle/issues/12214
 There are a couple alternatives we could use outlined in https://tomgregory.com/how-to-exclude-gradle-dependencies/
*/

plugins {
  id('java-platform')
}

group = 'io.meshcloud.meshstack.platform'

// allow the definition of dependencies to other platforms like the Spring Boot BOM
javaPlatform.allowDependencies()

dependencies {
  // Spring Boot BOM controls versions for all of spring's dependencies
  api(platform('org.springframework.boot:spring-boot-dependencies:3.5.13'))

  // Explicitly control kotlin versions. This should not be necessary since the kotlin plugins do this already
  // for kotlin's stdlib but we do have issues with "kotlin-reflect" library versions if we don't use the BOM.
  // Not applying this BOM will result in "Runtime JAR files in the classpath should have the same version" errors.
  // NOTE: sync this with the gradle plugins version when updating!
  api(enforcedPlatform('org.jetbrains.kotlin:kotlin-bom:2.1.21'))

  // explicitly control jackson versions used throughout our stack as silent serialization
  // behavior changes are dangerous to APIs
  api(enforcedPlatform('com.fasterxml.jackson:jackson-bom:2.18.4.1'))

  // conveniently control google cloud library versions
  api(platform('com.google.cloud:libraries-bom:26.59.0'))

  // import the aws sdk via BOM, see https://docs.aws.amazon.com/sdk-for-java/v2/developer-guide/setup-project-gradle.html
  api(platform('software.amazon.awssdk:bom:2.34.2'))

  constraints {
    api('org.springframework.security:spring-security-openid:5.8.16')
    api('org.springframework.security:spring-security-jwt:1.1.1.RELEASE')

    api('io.github.microutils:kotlin-logging:3.0.5')

    api('com.squareup.okhttp3:okhttp:4.12.0')
    api('com.squareup.okhttp3:logging-interceptor:4.12.0')

    api('com.openai:openai-java:1.5.1')

    // OpenStack client is quite dependent on this rest easy version. Newer versions might work but lower versions don't.
    // Always check the OS replication when changing this version. (Better: phase out OS client with our own HTTP
    // client).
    api('org.jboss.resteasy:resteasy-client:3.9.3.Final')

    // openstack
    api('org.pacesys:openstack4j:3.1.8-SNAPSHOT') // this is probably our own custom built openstack client

    // google sdk
    api('com.google.api-client:google-api-client:2.7.2')
    api('com.google.apis:google-api-services-admin-directory:directory_v1-rev20250325-2.0.0')
    api('com.google.apis:google-api-services-cloudresourcemanager:v1-rev20240310-2.0.0')
    api('com.google.apis:google-api-services-cloudbilling:v1-rev20241011-2.0.0')
    api('com.google.apis:google-api-services-deploymentmanager:v2-rev20250102-2.0.0')
    api('com.google.apis:google-api-services-serviceusage:v1-rev20250313-2.0.0')
    api('com.google.apis:google-api-services-storage:v1-rev20250312-2.0.0')
    api('com.google.auth:google-auth-library-oauth2-http:1.33.1')

    // Kubernetes
    api('io.kubernetes:client-java:18.0.1')

    api('org.flywaydb:flyway-mysql:11.6.0')

    // openshift client
    api('com.openshift:openshift-restclient-java:9.0.0.Final')

    // used for email templating
    api('org.apache.velocity:velocity-engine-core:2.4.1')
    api('org.apache.velocity.tools:velocity-tools-generic:3.1')

    api('jakarta.persistence:jakarta.persistence-api:3.1.0')
    api('com.aventrix.jnanoid:jnanoid:2.0.0')

    api('org.reflections:reflections:0.9.12')

    api('net.ravendb:ravendb:5.4.4')

    api('com.unboundid.product.scim2:scim2-sdk-common:5.0.0')

    api('org.commonmark:commonmark:0.24.0')

    api('jakarta.xml.bind:jakarta.xml.bind-api:4.0.2')

    api('commons-io:commons-io:2.18.0')
    api('org.apache.commons:commons-lang3:3.17.0')
    api('org.apache.commons:commons-text:1.13.0')

    // why no version number?
    api('com.google.guava:guava')

    // this is the units of measurement api we use in kraken
    api('org.tenkiv.physikal:complete-units:1.1.3.3')

    // serialization
    api('org.json:json:20250107')

    api('org.hashids:hashids:1.0.3')

    // jgit (interact with git using Kotlin)
    api('org.eclipse.jgit:org.eclipse.jgit:7.6.0.202603022253-r')
    api('org.eclipse.jgit:org.eclipse.jgit.ssh.apache:7.6.0.202603022253-r')

    // sshd-osgi 2.17.1 (pulled in by jgit.ssh.apache) uses BouncyCastle's EdDSAPrivateKey/EdDSAPublicKey
    // interfaces which were only added in 1.68. spring-security-jwt:1.1.1.RELEASE pins bcpkix-jdk15on to
    // 1.64 which is missing these classes, causing a NoClassDefFoundError at runtime when loading SSH keys.
    // 1.70 is the last release of the jdk15on artifact family and includes the required interfaces.
    api('org.bouncycastle:bcpkix-jdk15on:1.70')
    api('org.bouncycastle:bcprov-jdk15on:1.70')

    // hcl4j (parsing HCL files using Kotlin)
    api('com.bertramlabs.plugins:hcl4j:0.9.8')

    api('com.auth0:java-jwt:4.5.0')

    // fix dependent versions for acceptance tests
    api('com.jayway.jsonpath:json-path') {
      version {
        strictly '2.9.0'
      }
    }
  }
}
