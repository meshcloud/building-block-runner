/**
 The jvm-test-platform is the single source of truth for all dependencies we use for tests and do not ship to production.

 Individual gradle builds should not reference additional dependencies directly with a version number,
 but rather define a "version-less" dependency that will be resolved with help of this platform.
 This ensures we use consistent versions across all our libraries and can enforce updates in a single place.
*/

plugins {
  id('java-platform')
}

group = 'io.meshcloud.meshstack.platform'

// allow the definition of dependencies to other platforms like the JUnit 5 BOM
javaPlatform.allowDependencies()

dependencies {
  constraints {
    api('junit:junit:4.13.2')
    api('io.mockk:mockk:1.13.10')

    // acceptance tests
    api('org.wiremock:wiremock-jetty12:3.12.1')
  }

  // some tests uses junit jupiter, this potentially conflicts with junit4 and we should consider fixing this
  // we need to decide whether we want to use jupiter or junit 4 going forward
  api(platform('org.junit:junit-bom:5.10.5'))
}
