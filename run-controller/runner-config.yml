# Run Controller Configuration
# This configuration defines how the universal run controller manages building block runs.
# A single controller with one UUID fetches runs for all implementation types and dispatches
# the appropriate Kubernetes job based on the run's implementation type.

# Kubernetes namespace where all jobs and resources are created
namespace: default

# API configuration for meshStack backend
# need to add to /etc/hosts:
# 127.0.0.1 host.minikube.internal
api:
  url: http://host.minikube.internal:8080
  # Option 1: Basic auth credentials
  username: bb-api
  password: guest
  # Option 2: API key auth (takes precedence over username/password when both clientId and clientSecret are set)
  # clientId: your-client-id
  # clientSecret: your-client-secret

# Unique identifier for this universal run controller.
# This UUID is used to fetch runs of all implementation types from meshfed-api.
uuid: 46b7c17a-61f0-4062-9601-5785e60ce11f

# The workspace that owns this run controller (required for registration).
ownedByWorkspace: my-workspace

# Human-readable display name for this controller shown in the meshStack UI.
displayName: Universal Run Controller

