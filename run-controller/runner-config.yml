pollingIntervalSeconds: 10

# Job spec templates keyed by implementation type.
# When a run is fetched, its implementation type is used to look up which image and configuration
# to use for the Kubernetes job. Valid keys: TERRAFORM, GITHUB_WORKFLOW, GITLAB_PIPELINE,
# AZURE_DEVOPS_PIPELINE, MANUAL
implementations:
  MANUAL:
    image: manual-block-runner-local
    env:
      SPRING_PROFILES_ACTIVE: kubernetes

  GITHUB_WORKFLOW:
    image: github-block-runner-local
    env:
      SPRING_PROFILES_ACTIVE: kubernetes

  GITLAB_PIPELINE:
    image: gitlab-block-runner-local
    env:
      SPRING_PROFILES_ACTIVE: kubernetes

  AZURE_DEVOPS_PIPELINE:
    image: azure-devops-block-runner-local
    env:
      SPRING_PROFILES_ACTIVE: kubernetes

  TERRAFORM:
    image: tf-block-runner-local
    env:
      EXECUTION_MODE: single-run
